{%load static%}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link rel="stylesheet" href="{% static 'css/modern-theme.css'%}" />
    <link rel="shortcut icon" href="{%static 'images/lock-1-unlocked.png'%}" type="image/x-icon">
  </head>
  <body class="auth-page">
    <div class="auth-card">
      <form id="loginForm" method="post">
       {% csrf_token %}
       <img src="{%static 'images/blogger.png'%}" alt="">
        <h2>Welcome Back</h2>
        <input type="text" id="username" name="username" required placeholder="Username"  autofocus/>
        <input type="password" id="password" name="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
    </div>
  </body>
</html>
