{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link rel="stylesheet" href="{% static 'css/modern-theme.css' %}" />
    <link rel="stylesheet" href="{% static 'css/animations.css' %}" />
    <link rel="stylesheet" href="{% static 'css/fontawesome.css' %}" />
    <link rel="shortcut icon" href="{% static 'images/lock-1-unlocked.png' %}" type="image/x-icon">
</head>
<body class="auth-page">
    <div class="auth-split">
        <div class="auth-panel auth-panel-brand">
            <div class="auth-orbs">
                <span class="orb orb-1"></span>
                <span class="orb orb-2"></span>
                <span class="orb orb-3"></span>
            </div>
            <div class="auth-brand-content">
                <img src="{% static 'images/blogger.png' %}" alt="">
                <h1>Stand Blog<em>.</em></h1>
                <p>Your daily dose of stories, ideas, and inspiration.</p>
                <ul class="auth-brand-features">
                    <li><i class="fa fa-book"></i> Read curated articles</li>
                    <li><i class="fa fa-pencil"></i> Share your thoughts</li>
                    <li><i class="fa fa-users"></i> Join our community</li>
                </ul>
            </div>
        </div>
        <div class="auth-panel auth-panel-form">
            <div class="auth-card-v2">
                <div class="auth-card-header">
                    <h2>Welcome back</h2>
                    <p>Sign in to continue to your account</p>
                </div>
                <form id="loginForm" method="post">
                    {% csrf_token %}
                    <div class="auth-input-group">
                        <label for="username">Username</label>
                        <div class="auth-input-wrap">
                            <input type="text" id="username" name="username" required placeholder="Enter your username" autofocus />
                            <i class="fa fa-user"></i>
                        </div>
                    </div>
                    <div class="auth-input-group">
                        <label for="password">Password</label>
                        <div class="auth-input-wrap">
                            <input type="password" id="password" name="password" placeholder="Enter your password" required />
                            <i class="fa fa-lock"></i>
                        </div>
                    </div>
                    <button type="submit" class="auth-btn">Sign In</button>
                </form>
                <p class="auth-switch">Don't have an account? <a href="{% url 'registerUser' %}">Create one</a></p>
            </div>
        </div>
    </div>
</body>
</html>
