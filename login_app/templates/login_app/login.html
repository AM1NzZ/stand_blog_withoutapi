{%load static%}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link rel="stylesheet" href="{% static 'css/style.css'%}" />
    <link rel="shortcut icon" href="{%static 'images/lock-1-unlocked.png'%}" type="image/x-icon">
  </head>
  <body>
    <div class="login-container">
      
      <form id="loginForm" method="post">
       {% csrf_token %}
       <img style="width: 30%;" src="{%static 'images/blogger.png'%}" alt="">
        <!-- <label for="username">Username:</label> -->
        <input type="text" id="username" name="username" required placeholder="Username"  autofocus/>

        <!-- <label for="password">Password:</label> -->
        <input type="password" id="password" name="password" placeholder="Password" required />

        <button type="submit">Login</button>
      </form>
    </div>

    
</html>
