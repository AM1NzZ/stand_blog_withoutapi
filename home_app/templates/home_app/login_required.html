<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Required</title>
<style>
  body {
    background: #1f1f1f;
    color: #fff;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .box {
    background: #252525;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
    width: 350px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  a {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 18px;
    background: #6366f1;
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
  }
</style>
</head>
<body>

<div class="box">
  <h2>You must be logged in to view articles.</h2>
  <a href="{% url 'login' %}">Login</a>
</div>

</body>
</html>
